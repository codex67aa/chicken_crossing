<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agar.io Clone</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#111;font-family:'Segoe UI',sans-serif;overflow:hidden;color:#eee;}
    canvas{display:block;cursor:none;}

    /* ---- ÉCRAN ACCUEIL ---- */
    #start-screen{
      position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(160deg,#0d0d1a 60%,#1a0d2e);z-index:10;
    }
    #start-screen h1{font-size:48px;font-weight:700;letter-spacing:2px;color:#fff;margin-bottom:6px;}
    #start-screen h1 span{color:#4F8EF7;}
    #start-screen p{font-size:14px;color:#888;margin-bottom:28px;}
    #name-input{
      padding:10px 20px;font-size:16px;border-radius:8px;border:2px solid #333;
      background:#1e1e2e;color:#fff;outline:none;width:260px;text-align:center;margin-bottom:16px;
    }
    #name-input:focus{border-color:#4F8EF7;}
    #start-btn{
      padding:12px 40px;font-size:16px;font-weight:600;border-radius:8px;border:none;
      background:#4F8EF7;color:#fff;cursor:pointer;transition:background .2s;
    }
    #start-btn:hover{background:#3a7de0;}

    /* ---- HUD ---- */
    #ui{position:absolute;top:12px;left:14px;pointer-events:none;}
    #score{font-size:20px;font-weight:600;color:#fff;text-shadow:0 1px 4px #0008;}
    #coins-hud{font-size:14px;color:#f5c542;margin-top:4px;}

    /* ---- CLASSEMENT ---- */
    #leaderboard{
      position:absolute;top:14px;right:14px;width:190px;pointer-events:none;
      background:rgba(0,0,0,0.55);border-radius:10px;padding:10px 14px;
      backdrop-filter:blur(4px);
    }
    #leaderboard h3{font-size:13px;font-weight:600;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
    #lb-list{list-style:none;}
    #lb-list li{font-size:13px;padding:3px 0;display:flex;justify-content:space-between;border-bottom:0.5px solid #ffffff11;}
    #lb-list li:last-child{border:none;}
    #lb-list li.me{color:#4F8EF7;font-weight:600;}
    #lb-list li .lb-rank{color:#555;margin-right:6px;min-width:16px;}
    #lb-list li .lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    #lb-list li .lb-score{color:#f5c542;font-size:12px;}

    /* ---- BOUTIQUE SKINS ---- */
    #shop-btn{
      position:absolute;bottom:18px;right:18px;
      background:rgba(0,0,0,0.6);border:1.5px solid #f5c542;border-radius:10px;
      padding:8px 16px;font-size:13px;color:#f5c542;cursor:pointer;
      backdrop-filter:blur(4px);transition:background .2s;
    }
    #shop-btn:hover{background:rgba(245,197,66,0.15);}
    #shop{
      position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.8);z-index:9;
    }
    #shop-box{
      background:#161622;border-radius:16px;padding:28px 32px;width:540px;max-width:96vw;
      border:1px solid #2a2a3a;
    }
    #shop-box h2{font-size:22px;margin-bottom:4px;color:#fff;}
    #shop-box .coins-disp{font-size:14px;color:#f5c542;margin-bottom:20px;}
    #skins-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
    .skin-card{
      background:#1e1e2e;border-radius:10px;padding:12px 8px;text-align:center;
      border:2px solid transparent;cursor:pointer;transition:border .15s;
    }
    .skin-card.owned{border-color:#1D9E75;}
    .skin-card.active{border-color:#4F8EF7;background:#1a2540;}
    .skin-card .skin-icon{font-size:30px;line-height:1;margin-bottom:6px;}
    .skin-card .skin-name{font-size:12px;color:#ccc;}
    .skin-card .skin-cost{font-size:12px;color:#f5c542;margin-top:2px;}
    .skin-card .skin-cost.free{color:#1D9E75;}
    #shop-close{
      padding:9px 28px;background:#4F8EF7;border:none;border-radius:8px;color:#fff;
      font-size:14px;font-weight:600;cursor:pointer;
    }
    #shop-close:hover{background:#3a7de0;}

    /* ---- KILL NOTIF ---- */
    #kill-notif{
      position:absolute;top:50px;left:50%;transform:translateX(-50%);
      background:rgba(79,142,247,0.9);color:#fff;font-size:14px;font-weight:600;
      padding:7px 20px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .3s;
      white-space:nowrap;
    }

    /* ---- GAME OVER ---- */
    #game-over{
      position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.75);z-index:8;
    }
    #game-over h2{font-size:36px;font-weight:700;color:#fff;margin-bottom:8px;}
    #game-over .go-info{font-size:15px;color:#aaa;margin-bottom:6px;}
    #game-over .go-coins{font-size:14px;color:#f5c542;margin-bottom:24px;}
    #go-btn{
      padding:12px 36px;font-size:15px;font-weight:600;border-radius:8px;border:none;
      background:#4F8EF7;color:#fff;cursor:pointer;
    }
    #go-btn:hover{background:#3a7de0;}
  </style>
</head>
<body>
<div id="wrapper" style="position:relative;width:100vw;height:100vh;overflow:hidden;">
  <canvas id="c"></canvas>

  <!-- HUD -->
  <div id="ui">
    <div id="score">Score : 0</div>
    <div id="coins-hud">🪙 0 pièces</div>
  </div>

  <!-- CLASSEMENT -->
  <div id="leaderboard">
    <h3>🏆 Classement</h3>
    <ul id="lb-list"></ul>
  </div>

  <!-- BOUTIQUE -->
  <button id="shop-btn" onclick="openShop()">🎨 Skins</button>
  <div id="shop">
    <div id="shop-box">
      <h2>🎨 Boutique de skins</h2>
      <div class="coins-disp" id="shop-coins">🪙 0 pièces disponibles</div>
      <div id="skins-grid"></div>
      <button id="shop-close" onclick="closeShop()">Fermer</button>
    </div>
  </div>

  <!-- KILL NOTIF -->
  <div id="kill-notif"></div>

  <!-- ÉCRAN ACCUEIL -->
  <div id="start-screen">
    <h1>agar<span>.io</span></h1>
    <p>Mange les autres, domine le serveur</p>
    <input id="name-input" type="text" placeholder="Ton pseudo..." maxlength="16" />
    <button id="start-btn" onclick="beginGame()">Jouer</button>
  </div>

  <!-- GAME OVER -->
  <div id="game-over">
    <h2>💀 Éliminé !</h2>
    <p class="go-info" id="go-score">Score final : 0</p>
    <p class="go-coins" id="go-coins-earned"></p>
    <button id="go-btn" onclick="returnToMenu()">Retour au menu</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('wrapper');
const scoreEl = document.getElementById('score');
const coinsHud = document.getElementById('coins-hud');
const lbList = document.getElementById('lb-list');
const killNotif = document.getElementById('kill-notif');
const gameOverEl = document.getElementById('game-over');
const startScreen = document.getElementById('start-screen');

const W = 2400, H = 2400;
let player, cells, foods, mouse, animId, running;
let coins = parseInt(localStorage.getItem('coins') || '0');
let activeSkin = localStorage.getItem('activeSkin') || 'default';
let ownedSkins = JSON.parse(localStorage.getItem('ownedSkins') || '["default"]');

// ---- SKINS ----
const SKINS = [
  { id:'default', name:'Basique', icon:'😊', cost:0, color:'#4F8EF7' },
  { id:'fire',    name:'Feu',     icon:'🔥', cost:50,  color:'#D85A30' },
  { id:'star',    name:'Étoile',  icon:'⭐', cost:100, color:'#BA7517' },
  { id:'ghost',   name:'Fantôme', icon:'👻', cost:150, color:'#7F77DD' },
  { id:'alien',   name:'Alien',   icon:'👽', cost:200, color:'#1D9E75' },
  { id:'devil',   name:'Diable',  icon:'😈', cost:300, color:'#E24B4A' },
  { id:'crown',   name:'Roi',     icon:'👑', cost:500, color:'#f5c542' },
  { id:'diamond', name:'Diamant', icon:'💎', cost:800, color:'#5DCAA5' },
];

function getSkin(id){ return SKINS.find(s=>s.id===id)||SKINS[0]; }
function getActiveSkin(){ return getSkin(activeSkin); }

// ---- NOMS BOT ----
const BOT_NAMES = [
  'Shadow','Blaze','NeoX','Viper','Zara','Kira','Turbo','Ghost','Nyx','Rex',
  'Pixel','Astra','Dusk','Echo','Flux','Glitch','Hydra','Ion','Juno','Knox',
  'Luna','Mako','Nova','Orbit','Pulse','Quasar','Raze','Sync','Titan','Ultra',
  'Volt','Warp','Xeno','Yuki','Zero','Ace','Byte','Core','Drift','Edge'
];
const usedNames = new Set();
function rndBotName(){
  const avail = BOT_NAMES.filter(n=>!usedNames.has(n));
  const name = avail.length ? avail[Math.floor(Math.random()*avail.length)] : 'Bot'+Math.floor(Math.random()*999);
  usedNames.add(name);
  return name;
}

const BOT_SKINS = ['😈','👾','🤖','👺','🦊','🐺','🐸','🦁','🐙','🦄'];
function rndBotIcon(){ return BOT_SKINS[Math.floor(Math.random()*BOT_SKINS.length)]; }

const COLORS = ['#534AB7','#D85A30','#1D9E75','#D4537E','#378ADD','#639922','#BA7517','#E24B4A','#7F77DD','#5DCAA5'];
function rnd(a,b){ return a+Math.random()*(b-a); }
function rndColor(){ return COLORS[Math.floor(Math.random()*COLORS.length)]; }
function dist(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

function resize(){
  canvas.width = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
}

function spawnFood(){
  return {x:rnd(20,W-20),y:rnd(20,H-20),r:rnd(5,10),color:rndColor()};
}

function spawnCell(){
  const r = rnd(15,55);
  const name = rndBotName();
  return {
    x:rnd(r,W-r),y:rnd(r,H-r),r,
    color:rndColor(),
    vx:rnd(-1.2,1.2),vy:rnd(-1.2,1.2),
    score:Math.floor(Math.PI*r*r/10),
    name, icon:rndBotIcon()
  };
}

function beginGame(){
  const val = document.getElementById('name-input').value.trim();
  player = player || {};
  player.name = val || 'Joueur';
  startScreen.style.display = 'none';
  startGame();
}

function returnToMenu(){
  gameOverEl.style.display = 'none';
  startScreen.style.display = 'flex';
  document.getElementById('name-input').value = player ? player.name : '';
}

function startGame(){
  gameOverEl.style.display = 'none';
  resize();
  usedNames.clear();
  mouse = {x:canvas.width/2,y:canvas.height/2};
  const sk = getActiveSkin();
  player = {
    x:W/2,y:H/2,r:22,
    color:sk.color,icon:sk.icon,
    score:0,
    name: player.name || 'Joueur',
    kills:0
  };
  foods = Array.from({length:250},spawnFood);
  cells = Array.from({length:20},spawnCell);
  running = true;
  if(animId) cancelAnimationFrame(animId);
  loop();
}

canvas.addEventListener('mousemove',e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  mouse.x=e.touches[0].clientX-r.left; mouse.y=e.touches[0].clientY-r.top;
},{passive:false});

let killNotifTimeout;
function showKill(name, coinsGained){
  killNotif.textContent = `💀 Tu as mangé ${name} ! +${coinsGained}🪙`;
  killNotif.style.opacity = '1';
  clearTimeout(killNotifTimeout);
  killNotifTimeout = setTimeout(()=>{ killNotif.style.opacity='0'; }, 2200);
}

function saveCoins(){
  localStorage.setItem('coins', coins);
  coinsHud.textContent = `🪙 ${coins} pièces`;
}

function updateLeaderboard(){
  const all = [
    {name:player.name, score:Math.floor(player.score), isMe:true},
    ...cells.map(c=>({name:c.name, score:c.score, isMe:false}))
  ];
  all.sort((a,b)=>b.score-a.score);
  const top = all.slice(0,8);
  lbList.innerHTML = top.map((e,i)=>`
    <li class="${e.isMe?'me':''}">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${e.name}</span>
      <span class="lb-score">${e.score}</span>
    </li>`).join('');
}

function update(){
  const cw=canvas.width,ch=canvas.height;
  const dx=mouse.x-cw/2,dy=mouse.y-ch/2;
  const len=Math.hypot(dx,dy)||1;
  const speed=Math.max(1.5,5-player.r*0.04);
  player.x+=(dx/len)*speed;
  player.y+=(dy/len)*speed;
  player.x=Math.max(player.r,Math.min(W-player.r,player.x));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y));

  for(let i=foods.length-1;i>=0;i--){
    if(dist(player,foods[i])<player.r){
      player.score+=5;
      player.r=Math.sqrt(player.r*player.r+8)*0.92+0.5;
      foods.splice(i,1);
      foods.push(spawnFood());
    }
  }

  for(let i=cells.length-1;i>=0;i--){
    const c=cells[i];
    // IA simple : fuit si plus petit, chasse si plus grand
    const dx2=player.x-c.x,dy2=player.y-c.y,dl=Math.hypot(dx2,dy2)||1;
    const botSpeed=Math.max(0.8,3-c.r*0.03);
    if(dl<350){
      if(c.r>player.r*1.15){ c.x+=(dx2/dl)*botSpeed; c.y+=(dy2/dl)*botSpeed; }
      else if(player.r>c.r*1.15){ c.x-=(dx2/dl)*botSpeed*0.8; c.y-=(dy2/dl)*botSpeed*0.8; }
      else { c.x+=c.vx; c.y+=c.vy; }
    } else { c.x+=c.vx; c.y+=c.vy; }
    if(c.x<c.r||c.x>W-c.r) c.vx*=-1;
    if(c.y<c.r||c.y>H-c.r) c.vy*=-1;

    for(let j=foods.length-1;j>=0;j--){
      if(dist(c,foods[j])<c.r){ c.r+=0.12; c.score+=1; foods.splice(j,1); foods.push(spawnFood()); }
    }

    const d=dist(player,c);
    if(d<player.r+c.r-Math.max(player.r,c.r)*0.5){
      if(player.r>c.r*1.1){
        const gained=Math.max(5,Math.floor(c.r*1.5));
        player.score+=Math.floor(c.score)+gained;
        player.r=Math.sqrt(player.r*player.r+c.r*c.r*0.4);
        player.kills++;
        const coinReward=Math.max(3,Math.floor(c.r/5));
        coins+=coinReward;
        saveCoins();
        showKill(c.name, coinReward);
        usedNames.delete(c.name);
        cells.splice(i,1);
        cells.push(spawnCell());
      } else if(c.r>player.r*1.1){
        running=false;
        const earnedCoins=Math.floor(player.score/50);
        coins+=earnedCoins;
        saveCoins();
        gameOverEl.style.display='flex';
        document.getElementById('go-score').textContent=`Score final : ${Math.floor(player.score)} — ${player.kills} éliminations`;
        document.getElementById('go-coins-earned').textContent=`+${earnedCoins}🪙 gagnées cette partie`;
        return;
      }
    }
  }

  player.score+=0.05;
  scoreEl.textContent=`Score : ${Math.floor(player.score)}`;
  if(Math.floor(player.score)%30===0) updateLeaderboard();
}

function draw(){
  const cw=canvas.width,ch=canvas.height;
  const bg='#111118';
  const gridColor='rgba(255,255,255,0.04)';
  ctx.fillStyle=bg; ctx.fillRect(0,0,cw,ch);

  const camX=player.x-cw/2,camY=player.y-ch/2;
  ctx.save();
  ctx.translate(-camX,-camY);

  const gs=70;
  const sx=((-camX%gs)+gs)%gs-gs;
  const sy=((-camY%gs)+gs)%gs-gs;
  ctx.strokeStyle=gridColor; ctx.lineWidth=0.5;
  for(let x=sx;x<cw+gs;x+=gs){ ctx.beginPath();ctx.moveTo(camX+x,camY);ctx.lineTo(camX+x,camY+ch);ctx.stroke(); }
  for(let y=sy;y<ch+gs;y+=gs){ ctx.beginPath();ctx.moveTo(camX,camY+y);ctx.lineTo(camX+cw,camY+y);ctx.stroke(); }

  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=2.5;
  ctx.strokeRect(0,0,W,H);

  for(const f of foods){
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.fillStyle=f.color; ctx.fill();
  }

  // Bots
  for(const c of cells){
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.fillStyle=c.color+'bb'; ctx.fill();
    ctx.strokeStyle=c.color; ctx.lineWidth=2; ctx.stroke();
    // Icone
    if(c.r>14){
      ctx.font=`${Math.floor(c.r*0.7)}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(c.icon,c.x,c.y);
    }
    // Nom + score
    const nameY=c.y-c.r-14;
    ctx.font=`600 ${Math.max(11,Math.floor(c.r*0.38))}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,0.55)';
    const tw=ctx.measureText(c.name).width;
    ctx.fillRect(c.x-tw/2-4,nameY-9,tw+8,18);
    ctx.fillStyle='#fff';
    ctx.fillText(c.name,c.x,nameY);
    // mini score
    ctx.font=`500 ${Math.max(9,Math.floor(c.r*0.28))}px sans-serif`;
    ctx.fillStyle='rgba(255,220,80,0.95)';
    ctx.fillText(c.score,c.x,c.y+c.r+12);
  }

  // Joueur
  const sk=getActiveSkin();
  ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
  ctx.fillStyle=sk.color+'cc'; ctx.fill();
  ctx.strokeStyle=sk.color; ctx.lineWidth=3; ctx.stroke();
  if(player.r>12){
    ctx.font=`${Math.floor(player.r*0.7)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(sk.icon,player.x,player.y);
  }
  // Nom + score joueur
  const pNameY=player.y-player.r-16;
  ctx.font=`700 ${Math.max(12,Math.floor(player.r*0.38))}px sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.6)';
  const ptw=ctx.measureText(player.name).width;
  ctx.fillRect(player.x-ptw/2-5,pNameY-10,ptw+10,20);
  ctx.fillStyle='#4F8EF7';
  ctx.fillText(player.name,player.x,pNameY);
  ctx.font=`600 ${Math.max(10,Math.floor(player.r*0.3))}px sans-serif`;
  ctx.fillStyle='rgba(255,220,80,0.95)';
  ctx.fillText(Math.floor(player.score),player.x,player.y+player.r+14);

  ctx.restore();
}

function loop(){
  if(!running) return;
  update(); draw();
  animId=requestAnimationFrame(loop);
}

// ---- BOUTIQUE ----
function renderShop(){
  document.getElementById('shop-coins').textContent=`🪙 ${coins} pièces disponibles`;
  const grid=document.getElementById('skins-grid');
  grid.innerHTML=SKINS.map(s=>{
    const owned=ownedSkins.includes(s.id);
    const active=activeSkin===s.id;
    let cls='skin-card'+(owned?' owned':'')+(active?' active':'');
    let costHTML=owned
      ? `<div class="skin-cost free">${active?'✔ Actif':'Possédé'}</div>`
      : `<div class="skin-cost">${s.cost===0?'<span class="free">Gratuit</span>':s.cost+'🪙'}</div>`;
    return `<div class="${cls}" onclick="buySkin('${s.id}')">
      <div class="skin-icon">${s.icon}</div>
      <div class="skin-name">${s.name}</div>
      ${costHTML}
    </div>`;
  }).join('');
}

function buySkin(id){
  const s=getSkin(id);
  if(ownedSkins.includes(id)){
    activeSkin=id;
    localStorage.setItem('activeSkin',id);
    if(player){ player.color=s.color; player.icon=s.icon; }
    renderShop();
    return;
  }
  if(coins>=s.cost){
    coins-=s.cost;
    ownedSkins.push(id);
    activeSkin=id;
    localStorage.setItem('coins',coins);
    localStorage.setItem('activeSkin',id);
    localStorage.setItem('ownedSkins',JSON.stringify(ownedSkins));
    if(player){ player.color=s.color; player.icon=s.icon; }
    saveCoins();
    renderShop();
  } else {
    alert(`Il te manque ${s.cost-coins}🪙 pour débloquer ce skin !`);
  }
}

function openShop(){
  renderShop();
  document.getElementById('shop').style.display='flex';
}
function closeShop(){
  document.getElementById('shop').style.display='none';
}

window.addEventListener('resize',()=>{resize();});
saveCoins();
updateLeaderboard();
</script>
</body>
</html>
